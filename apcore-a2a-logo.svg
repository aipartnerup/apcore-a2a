<svg width="512" height="512" viewBox="60 36 430 440" xmlns="http://www.w3.org/2000/svg">
  <!-- apcore-a2a clownfish logo - cartoon ocean mascot -->
  <defs>
    <!-- Body: Vibrant orange radial gradient -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    
    <!-- Stripe: Soft white/grey gradient -->
    <linearGradient id="stripeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>

    <!-- Bioluminescence glow (consistent with MCP/apcore logos) -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FDBA74" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow Background -->
  <circle cx="256" cy="256" r="210" fill="url(#glowGrad)"/>

  <!-- Fins (behind body) -->
  <!-- Dorsal Fin (top) -->
  <path d="M 180,180 Q 256,100 330,180" fill="#EA580C" stroke="#1E293B" stroke-width="4" stroke-linejoin="round"/>
  <!-- Pelvic Fins (bottom) -->
  <path d="M 210,360 Q 240,420 270,360" fill="#EA580C" stroke="#1E293B" stroke-width="4" stroke-linejoin="round"/>
  <!-- Tail Fin (back) -->
  <path d="M 410,240 Q 480,200 480,270 Q 480,340 410,300" fill="#EA580C" stroke="#1E293B" stroke-width="4" stroke-linejoin="round"/>

  <!-- Main Body -->
  <path d="M 70,270 C 70,170 180,150 280,150 C 380,150 430,210 430,270 C 430,330 380,390 280,390 C 180,390 70,370 70,270 Z" fill="url(#bodyGrad)" stroke="#1E293B" stroke-width="6"/>

  <!-- Stripes with thin dark edges -->
  <!-- Head Stripe -->
  <path d="M 140,165 C 170,210 170,330 140,375 L 180,385 C 210,330 210,210 180,155 Z" fill="url(#stripeGrad)" stroke="#1E293B" stroke-width="3"/>
  <!-- Middle Stripe -->
  <path d="M 270,150 C 310,200 310,340 270,390 L 320,390 C 360,340 360,200 320,150 Z" fill="url(#stripeGrad)" stroke="#1E293B" stroke-width="3"/>
  <!-- Tail Stripe -->
  <path d="M 380,190 C 400,230 400,310 380,350 L 410,340 C 430,310 430,230 410,200 Z" fill="url(#stripeGrad)" stroke="#1E293B" stroke-width="3"/>

  <!-- Pectoral Fin (on top) -->
  <path d="M 210,270 Q 170,310 210,340" fill="#F97316" stroke="#1E293B" stroke-width="4" fill-opacity="0.9"/>

  <!-- Face (Cartoon style - big expressive eyes) -->
  <!-- Left Eye -->
  <ellipse cx="120" cy="250" rx="20" ry="22" fill="white"/>
  <circle cx="125" cy="255" r="12" fill="#1E1B4B"/>
  <circle cx="130" cy="248" r="5" fill="white"/>

  <!-- Right Eye (slightly higher and further back) -->
  <ellipse cx="160" cy="240" rx="18" ry="20" fill="white"/>
  <circle cx="165" cy="245" r="11" fill="#1E1B4B"/>
  <circle cx="170" cy="238" r="4.5" fill="white"/>

  <!-- Smile -->
  <path d="M 100,300 Q 120,320 140,300" stroke="#1E1B4B" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush (matching starfish/anemone style) -->
  <ellipse cx="90" cy="290" rx="12" ry="8" fill="#FF9999" opacity="0.45"/>
</svg>
