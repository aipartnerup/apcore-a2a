<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- apcore-a2a: Pure Mascot Fusion (Natural Overlay, Resized to 0.8x, 10px bottom margin) -->
  <defs>
    <radialGradient id="jelly_bellGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </radialGradient>
    <linearGradient id="jelly_tentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="a2a_bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    <linearGradient id="a2a_stripeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <!-- 1. PENDANT: Mini Clownfish (Placed first, Resized & Positioned for 10px margin) -->
  <g transform="translate(122, 280) scale(0.48)">
    <!-- Fins -->
    <path d="M 180,180 Q 256,100 330,180" fill="#EA580C" stroke="#1E293B" stroke-width="12" />
    <path d="M 410,240 Q 480,200 480,270 Q 480,340 410,300" fill="#EA580C" stroke="#1E293B" stroke-width="12" />
    <path d="M 210,360 Q 240,420 270,360" fill="#EA580C" stroke="#1E293B" stroke-width="12" stroke-linejoin="round"/>
    <!-- Body -->
    <path d="M 70,270 C 70,170 180,150 280,150 C 380,150 430,210 430,270 C 430,330 380,390 280,390 C 180,390 70,370 70,270 Z" fill="url(#a2a_bodyGrad)" stroke="#1E293B" stroke-width="15"/>
    <!-- Stripes -->
    <path d="M 140,165 C 170,210 170,330 140,375 L 180,385 C 210,330 210,210 180,155 Z" fill="url(#a2a_stripeGrad)" stroke="#1E293B" stroke-width="10"/>
    <path d="M 270,150 C 310,200 310,340 270,390 L 320,390 C 360,340 360,200 320,150 Z" fill="url(#a2a_stripeGrad)" stroke="#1E293B" stroke-width="10"/>
    <!-- Face -->
    <circle cx="120" cy="250" r="28" fill="white"/>
    <circle cx="125" cy="255" r="16" fill="#1E1B4B"/>
    <!-- Smile -->
    <path d="M 100,300 Q 125,330 150,300" stroke="#1E1B4B" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 2. MAIN: Jellyfish -->
  <g transform="translate(0, -70)">
    <path d="M 175,300 C 160,350 145,390 155,430 Q 162,455 150,470" stroke="url(#jelly_tentGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 210,310 C 200,360 188,400 195,445 Q 200,465 190,480" stroke="url(#jelly_tentGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 245,310 C 240,365 235,410 242,455 Q 248,475 240,490" stroke="url(#jelly_tentGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 267,310 C 272,365 277,410 270,455 Q 264,475 272,490" stroke="url(#jelly_tentGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 302,310 C 312,360 324,400 317,445 Q 312,465 322,480" stroke="url(#jelly_tentGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M 337,300 C 352,350 367,390 357,430 Q 350,455 362,470" stroke="url(#jelly_tentGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 130,290 C 130,150 190,80 256,80 C 322,80 382,150 382,290 Q 382,310 256,310 Q 130,310 130,290 Z" fill="url(#jelly_bellGrad)"/>
    <circle cx="222" cy="215" r="23" fill="white"/>
    <circle cx="290" cy="215" r="23" fill="white"/>
    <circle cx="228" cy="220" r="13" fill="#1E1B4B"/>
    <circle cx="296" cy="220" r="13" fill="#1E1B4B"/>
    <path d="M 240,252 Q 256,268 272,252" stroke="#312E81" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
